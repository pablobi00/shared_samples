# environment.conf - Production environment
# Absolute path in Puppet Enterprise:
# /etc/puppetlabs/code/environments/production/environment.conf

# Puppet looks for modules in this order:
#   site/      -> local roles and profiles for this environment
#   modules/   -> Puppet Forge modules (e.g. puppetlabs-apache)
#   $basemodulepath -> Puppet's built-in module paths
modulepath = site:modules:$basemodulepath

# The main manifest where node classification begins.
manifest = manifests/site.pp
